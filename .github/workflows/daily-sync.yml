name: Daily Habit Tracker Sync

on:
  schedule:
    # Garmin sleep score — 8:30am UTC (adjust to your timezone)
    - cron: '30 11 * * *'
  workflow_dispatch:  # Manual trigger button in GitHub UI

jobs:
  garmin-sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: pip install garminconnect requests
      - name: Sync Garmin sleep scores
        env:
          GARMIN_EMAIL: ${{ secrets.GARMIN_EMAIL }}
          GARMIN_PASSWORD: ${{ secrets.GARMIN_PASSWORD }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_USER_ID: ${{ secrets.SUPABASE_USER_ID }}
        run: python sync_garmin.py

  mfp-sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: pip install requests beautifulsoup4
      - name: Sync MFP nutrition
        env:
          MFP_USERNAME: ${{ secrets.MFP_USERNAME }}
          MFP_PASSWORD: ${{ secrets.MFP_PASSWORD }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_USER_ID: ${{ secrets.SUPABASE_USER_ID }}
        run: python sync_mfp.py
